<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lumi | Auxilium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ============================================================
         Auxilium theme tokens
         NOTE: swap these hexes for your real brand values if they
         differ — everything below derives from this block.
         ============================================================ */
      :root{
        --bg:#F7F5FA; --card:#ffffff; --accent:#6B46A3; --accent-deep:#4E3878;
        --user:#6B46A3; --bot-bg:#EDE6F5; --bot-text:#2B2140;
        --muted:#6B6178; --ink:#2B2140; --line:#DDD3E8;
        --contest:#C97A2E; --contest-bg:#FBF0E1; --contest-line:#EAD2AC;
        --match:#5B7FA6; --match-bg:#EAF1F8; --match-line:#CFE0EE;
        --font-display:"Fraunces", Georgia, serif;
        --font-body:"Plus Jakarta Sans", -apple-system, "Segoe UI", sans-serif;
      }
      html,body{height:100%;margin:0;font-family:var(--font-body);background:var(--bg);color:var(--ink)}
      .container{max-width:860px;margin:0 auto;padding:24px 20px 32px}

      /* Site-consistent top bar, so this page reads as part of theauxilium.ca */
      .site-bar{background:var(--accent);color:#fff;padding:14px 20px}
      .site-bar-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
      .site-bar a.back-link{color:#fff;text-decoration:none;font-size:13.5px;font-weight:600;opacity:0.92;display:flex;align-items:center;gap:6px}
      .site-bar a.back-link:hover{opacity:1;text-decoration:underline}
      .site-bar .site-name{font-family:var(--font-display);font-size:16px;font-weight:600;letter-spacing:0.02em}

      header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
      .logo{width:46px;height:46px;border-radius:14px 4px 14px 14px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-family:var(--font-display);font-weight:600;font-size:18px;flex-shrink:0}
      h1{font-family:var(--font-display);font-size:21px;font-weight:600;margin:0;color:var(--ink)}
      .meta{font-size:13px;color:var(--muted);margin-top:2px}

      #messages{background:var(--card);border-radius:16px;padding:16px;height:380px;overflow:auto;border:1px solid var(--line)}
      .msg{display:flex;gap:10px;align-items:flex-end;margin:8px 0}
      .bubble{max-width:74%;padding:10px 14px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
      .msg.user{justify-content:flex-end}
      .msg.user .bubble{background:var(--user);color:#fff;border-radius:16px 4px 16px 16px}
      .msg.bot .bubble{background:var(--bot-bg);color:var(--bot-text);border-radius:4px 16px 16px 16px}
      .msg.bot .bubble strong{color:var(--accent-deep)}
      .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:600;flex-shrink:0;font-size:14px}
      .avatar.user{background:var(--accent-deep)}
      .avatar.bot{background:var(--accent)}
      .avatar.general{background:var(--accent)}
      .avatar.match{background:var(--match)}
      .avatar.contest{background:var(--contest)}

      /* Agent buttons */
      .quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
      .quick-action{display:inline-flex;align-items:center;gap:7px;background:var(--match-bg);color:var(--match);border:1px solid var(--match-line);font-size:13px;padding:7px 14px;border-radius:12px;cursor:pointer;font-family:var(--font-body);font-weight:500}
      .quick-action .agent-icon{flex-shrink:0}
      .quick-action:hover{background:#DCE9F3}
      .quick-action.active{background:var(--accent);color:#fff;border-color:var(--accent-deep)}
      .quick-action.contest-btn{background:var(--contest-bg);color:#8A5A22;border-color:var(--contest-line)}
      .quick-action.contest-btn:hover{background:#F5E3C6}
      .quick-action.contest-btn.active{background:var(--contest);color:#fff;border-color:#8A5A22}

      /* Mentor match panel */
      .panel{margin-top:12px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px}
      .panel h2{font-family:var(--font-display);font-size:13px;font-weight:600;margin:0 0 10px;color:var(--ink);letter-spacing:0.02em}
      .match-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:linear-gradient(180deg,#fff,var(--bg));margin-bottom:8px}
      .match-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
      .match-rank{font-size:12px;font-weight:700;color:var(--accent-deep);background:var(--bot-bg);padding:4px 8px;border-radius:999px}
      .match-score{font-size:12px;font-weight:700;color:#3C6B3C}
      .match-name{font-size:15px;font-weight:700;margin:4px 0 4px;color:var(--ink)}
      .match-meta{font-size:13px;color:var(--muted)}
      .match-expl{margin-top:6px;font-size:13px;color:var(--ink);line-height:1.5;opacity:0.85}
      .book-state{margin-top:10px;padding:10px 12px;border-radius:12px;background:var(--match-bg);color:var(--match);font-size:13px;font-weight:600}

      /* Contest problem panel */
      .contest-panel{margin-top:12px;border:1px solid var(--contest-line);border-radius:16px;background:var(--contest-bg);padding:14px}
      .contest-panel h2{font-family:var(--font-display);font-size:13px;font-weight:600;margin:0 0 12px;color:#8A5A22}
      .problem-set-download{margin-bottom:12px;padding:10px 12px;border:1px solid var(--contest-line);border-radius:12px;background:#fff}
      .problem-set-download .label{font-size:12px;color:#8A5A22;font-weight:700;margin-bottom:8px}
      .problem-set-download a{display:inline-block;background:var(--contest);color:#fff;text-decoration:none;font-size:12px;padding:7px 12px;border-radius:8px;font-weight:600}
      .problem-set-download a:hover{background:#8A5A22}

      /* Problem card — image-based display */
      .problem-card{border:1px solid var(--contest-line);border-radius:14px;background:#fff;margin-bottom:12px;overflow:hidden}
      .problem-card-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--contest-line);background:#FFF9F0}
      .problem-title{font-size:14px;font-weight:700;color:var(--ink)}
      .topic-chips{display:flex;gap:5px;flex-wrap:wrap}
      .topic-chip{font-size:11px;padding:2px 7px;border-radius:999px;background:#FBE9C6;color:#8A5A22;border:1px solid var(--contest-line);font-weight:600}
      .diagram-badge{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--match-bg);color:var(--match);border:1px solid var(--match-line);font-weight:600}

      /* The actual PDF page image */
      .problem-image-wrap{padding:12px;text-align:center;background:#FAFAF8}
      .problem-image-wrap img{max-width:100%;border-radius:8px;box-shadow:0 2px 10px rgba(31,46,41,0.1)}
      .problem-loading{padding:24px;text-align:center;color:#8A5A22;font-size:13px}
      .problem-error{padding:14px;color:#B3402F;font-size:13px;background:#FBEAE7;border-top:1px solid #F0C9C2}

      /* Problem action bar */
      .problem-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--contest-line);background:#FFF9F0}
      .prob-btn{font-size:12px;padding:5px 11px;border-radius:10px;cursor:pointer;border:1px solid;font-weight:500;font-family:var(--font-body)}
      .prob-btn.solution{background:var(--contest-bg);color:var(--contest);border-color:var(--contest-line)}
      .prob-btn.solution:hover{background:#F5E3C6}
      .prob-btn.solution.active{background:var(--contest);color:#fff;border-color:#8A5A22}
      .prob-btn.nav{background:var(--bg);color:var(--muted);border-color:var(--line)}
      .prob-btn.nav:hover{background:#EAF0EE}

      /* Suggestion chips */
      .contest-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
      .contest-chip{font-size:12px;padding:5px 11px;border-radius:999px;background:var(--contest-bg);color:var(--contest);border:1px solid var(--contest-line);cursor:pointer;font-weight:500}
      .contest-chip:hover{background:#F5E3C6}

      /* Slot picker — weekly calendar grid */
      .slot-picker{margin-top:12px;padding:12px;border-radius:14px;background:var(--match-bg);border:1px solid var(--match-line)}
      .slot-picker-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
      .slot-picker-title{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--match)}
      .slot-close-btn{font-size:11px;padding:3px 9px;border-radius:8px;border:1px solid var(--match-line);background:#fff;color:var(--match);cursor:pointer;font-family:var(--font-body)}
      .slot-close-btn:hover{background:var(--match-bg)}

      /* Calendar table */
      .cal-wrap{overflow-x:auto}
      .cal-table{width:100%;border-collapse:collapse;min-width:480px;font-size:12px}
      .cal-table th{background:var(--match);color:#fff;padding:6px 4px;text-align:center;font-weight:600;white-space:nowrap}
      .cal-table th.time-col{background:var(--accent-deep);width:52px}
      .cal-table td{border:1px solid var(--match-line);padding:3px;vertical-align:top;min-width:70px;height:32px}
      .cal-table td.time-label{background:#fff;color:var(--match);font-weight:600;text-align:right;padding:4px 6px;white-space:nowrap;font-size:11px}
      .cal-table tr:nth-child(even) td{background:#F5F9FC}
      .cal-table tr:nth-child(even) td.time-label{background:#EAF1F8}

      /* Slot cell button */
      .slot-cell-btn{width:100%;padding:5px 3px;border-radius:8px;border:1px solid var(--match-line);background:#fff;color:var(--match);font-size:11px;font-weight:600;cursor:pointer;text-align:center;line-height:1.2;transition:background 0.12s;font-family:var(--font-body)}
      .slot-cell-btn:hover{background:var(--match-bg)}
      .slot-cell-btn.selected{background:var(--match);color:#fff;border-color:var(--match)}
      .slot-loading{font-size:13px;color:var(--match);padding:6px 0;text-align:center}

      /* Composer */
      .composer{display:flex;gap:10px;margin-top:12px}
      textarea{flex:1;min-height:60px;border-radius:14px;padding:10px 14px;border:1px solid var(--line);resize:none;font-size:14.5px;font-family:var(--font-body);background:#fff}
      textarea:focus, .quick-action:focus-visible, .prob-btn:focus-visible, button:focus-visible{outline:3px solid var(--contest);outline-offset:2px}
      button{background:var(--accent);color:white;border:none;padding:10px 18px;border-radius:14px;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-body)}
      button:hover{background:var(--accent-deep)}
      button:active{transform:translateY(1px)}
      @media(prefers-reduced-motion: reduce){ *{transition:none !important} }
      @media(max-width:640px){.container{padding:16px 12px 24px}}
    </style>
  </head>
  <body>
    <div class="site-bar">
      <div class="site-bar-inner">
        <a class="back-link" href="https://theauxilium.ca/">&larr; Back to Auxilium</a>
        <span class="site-name">auxilium</span>
      </div>
    </div>
    <div class="container">
      <header>
        <div class="logo">L</div>
        <div>
          <h1>Lumi</h1>
          <div class="meta">Auxilium's assistant — find mentors, book sessions, and explore Waterloo contest problems.</div>
        </div>
      </header>

      <div class="quick-actions">
        <button type="button" class="quick-action active" data-agent="general">
          <svg class="agent-icon" viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 2v4M10 14v4M2 10h4M14 10h4M4.8 4.8l2.6 2.6M12.6 12.6l2.6 2.6M4.8 15.2l2.6-2.6M12.6 7.4l2.6-2.6"/></svg>
          General Agent
        </button>
        <button type="button" class="quick-action" data-agent="match">
          <svg class="agent-icon" viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7.2" cy="10" r="4.6"/><circle cx="12.8" cy="10" r="4.6"/></svg>
          Match Agent
        </button>
        <button type="button" class="quick-action contest-btn" data-agent="contest">
          <svg class="agent-icon" viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h8v3.2a4 4 0 0 1-8 0V3z"/><path d="M6 4H3.2v1a3 3 0 0 0 3 3"/><path d="M14 4h2.8v1a3 3 0 0 1-3 3"/><path d="M10 10.2v2.8"/><path d="M7.3 17h5.4"/><path d="M8.3 13.8h3.4V17H8.3z"/></svg>
          Contest Help
        </button>
      </div>

      <div id="messages" aria-live="polite"></div>

      <!-- Mentor match panel -->
      <div class="panel" id="results-panel" style="display:none">
        <h2>Top Matches</h2>
        <div id="match-list"></div>
        <div class="book-state" id="book-state" style="display:none"></div>
      </div>

      <!-- Contest problem panel -->
      <div class="contest-panel" id="contest-panel" style="display:none">
        <h2>📐 Contest Problems</h2>
        <div class="problem-set-download" id="problem-set-download" style="display:none">
          <div class="label" id="problem-set-label">Problem set ready</div>
          <div style="display:flex;gap:8px">
            <a id="problem-set-link" href="#" target="_blank" rel="noopener">📄 Problems PDF</a>
            <a id="solutions-set-link" href="#" target="_blank" rel="noopener" style="display:none">📚 Solutions PDF</a>
          </div>
        </div>
        <div id="problem-list"></div>
        <div id="contest-chips-wrap" style="display:none">
          <div style="font-size:12px;color:#9a3412;margin-bottom:5px;font-weight:600">Try asking:</div>
          <div class="contest-chips" id="contest-chips"></div>
        </div>
      </div>

      <div class="composer">
        <textarea id="input" placeholder="Ask me anything — find a mentor, book a session, or explore contest problems..."></textarea>
        <button id="send">Send</button>
      </div>
    </div>

    <script>
      if (location.protocol === 'file:') {
        location.replace('http://localhost:8000/frontend/chat.html');
      }

      // ------------------------------------------------------------------
      // API base URL. Set this to wherever your FastAPI backend is deployed
      // (e.g. "https://lumi-api.onrender.com"). Falls back to localhost for
      // local development so `uvicorn api.main:app --reload` still works.
      // ------------------------------------------------------------------
      const API = window.LUMI_API_BASE || 'http://localhost:8000';
      const SESSION_KEY = 'lumi_session_id';
      const SESSION = localStorage.getItem(SESSION_KEY) || ('session_' + Math.random().toString(36).slice(2, 9));
      localStorage.setItem(SESSION_KEY, SESSION);
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      let selectedAgent = 'general';
      let activeChatMode = 'general';
      let lastProblems = [];
      function displayAgentName(a){ return a === 'general' ? 'General' : a === 'match' ? 'Match' : a === 'contest' ? 'Contest' : a }

      function applySelectedAgent(agent, announce = false) {
        selectedAgent = agent || 'general';
        activeChatMode = selectedAgent;
        document.querySelectorAll('.quick-action').forEach((item) => item.classList.toggle('active', item.dataset.agent === selectedAgent));
        if (selectedAgent !== 'match') {
          document.getElementById('results-panel').style.display = 'none';
        }
        if (selectedAgent === 'contest') {
          if (announce) {
            addMsg('bot', '🏆 Contest Help mode.\n\nI can:\n• Show specific problems — "Euclid 2023 Q5"\n• Explain solutions step by step\n• Find practice problems — "geometry practice grade 10"\n• Answer concept questions — "what is modular arithmetic?"\n• List available contests', 'contest');
          }
          loadContestStatus();
        } else {
          if (announce) {
            addMsg('bot', `Switched to ${displayAgentName(selectedAgent)} agent.`);
          }
          document.getElementById('contest-panel').style.display = 'none';
        }
      }

      // ── Agent switching ─────────────────────────────────────────────────────
      document.querySelectorAll('.quick-actions .quick-action').forEach((button) => {
        button.addEventListener('click', () => {
          applySelectedAgent(button.dataset.agent || 'general', true);
        });
      });

      inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
      document.getElementById('send').onclick = send;

      // ── Message rendering ───────────────────────────────────────────────────
      // Shared minimalist icon set — same marks used on the agent buttons above
      const AGENT_ICONS = {
        general: '<svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 2v4M10 14v4M2 10h4M14 10h4M4.8 4.8l2.6 2.6M12.6 12.6l2.6 2.6M4.8 15.2l2.6-2.6M12.6 7.4l2.6-2.6"/></svg>',
        match: '<svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7.2" cy="10" r="4.6"/><circle cx="12.8" cy="10" r="4.6"/></svg>',
        contest: '<svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h8v3.2a4 4 0 0 1-8 0V3z"/><path d="M6 4H3.2v1a3 3 0 0 0 3 3"/><path d="M14 4h2.8v1a3 3 0 0 1-3 3"/><path d="M10 10.2v2.8"/><path d="M7.3 17h5.4"/><path d="M8.3 13.8h3.4V17H8.3z"/></svg>',
        user: '<svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="7" r="3.2"/><path d="M3.5 17c1.1-3.4 4-5 6.5-5s5.4 1.6 6.5 5"/></svg>',
      };

      function addMsg(role, text, avatarType) {
        const wrap = document.createElement('div');
        wrap.className = 'msg ' + role;
        const av = document.createElement('div');
        const effectiveAvatar = avatarType || (role === 'bot' ? 'general' : role);
        av.className = 'avatar ' + effectiveAvatar;
        av.innerHTML = role === 'user' ? AGENT_ICONS.user : (AGENT_ICONS[effectiveAvatar] || AGENT_ICONS.general);
        const bub = document.createElement('div');
        bub.className = 'bubble';
        bub.innerHTML = escHtml(text)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');
        wrap.appendChild(role === 'user' ? bub : av);
        wrap.appendChild(role === 'user' ? av : bub);
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      // ── Mentor match rendering ──────────────────────────────────────────────
      function renderMatches(matches, data = {}) {
        const panel = document.getElementById('results-panel');
        const list = document.getElementById('match-list');
        const booking = data.booking_state || 'none';
        const hideMatchList = (
          data.state === 'awaiting_slot_selection' ||
          data.state === 'awaiting_booking_name' ||
          data.state === 'awaiting_booking_email' ||
          data.state === 'awaiting_booking_confirmation' ||
          booking === 'awaiting_slot' ||
          booking === 'awaiting_name' ||
          booking === 'awaiting_email' ||
          booking === 'awaiting_confirmation' ||
          booking === 'booked'
        );
        if (hideMatchList) {
          panel.style.display = 'none';
          list.innerHTML = '';
          return;
        }
        const visibleMatches = (matches || []).slice(0, 3);
        if (!visibleMatches.length) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        list.innerHTML = visibleMatches
          .map((m, i) => {
            const mentorGrade = m.grade ?? m.mentor_grade ?? m.mentorGrade ?? '—';
            return `
          <div class="match-card" id="mcard-${i}">
            <div class="match-top">
              <div class="match-rank">#${i + 1}</div>
              <div class="match-score">${Math.round((m.match_score || 0) * 100)}%</div>
            </div>
            <div class="match-name">${escHtml(m.name)}</div>
            <div class="match-meta">Grade ${escHtml(String(mentorGrade))} · ${escHtml(m.subject)} · ${escHtml(m.qualifications || '—')}</div>
            <div class="match-expl">${escHtml(m.explanation || '')}</div>
            <div style="margin-top:10px">
              <button class="prob-btn nav" onclick="openSlotPicker(${i}, ${JSON.stringify(m.name).replace(/"/g,'&quot;')})">
                🗓 View available time slots
              </button>
            </div>
            <div class="slot-picker" id="slots-${i}" style="display:none">
              <div class="slot-picker-header">
                <span class="slot-picker-title">📅 Weekly availability</span>
                <button class="slot-close-btn" onclick="closeSlotPicker(${i})">✕ Close</button>
              </div>
              <div class="cal-wrap" id="slot-grid-${i}">
                <span class="slot-loading">Loading…</span>
              </div>
            </div>
          </div>`;
          })
          .join('');

        // Store match data for slot picker
        window._lastMatches = visibleMatches;
      }

      const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

      function closeSlotPicker(cardIndex) {
        document.getElementById(`slots-${cardIndex}`).style.display = 'none';
      }

      async function openSlotPicker(cardIndex, mentorName) {
        const picker = document.getElementById(`slots-${cardIndex}`);
        const wrap   = document.getElementById(`slot-grid-${cardIndex}`);
        if (picker.style.display !== 'none') {
          picker.style.display = 'none';
          return;
        }
        picker.style.display = 'block';
        wrap.innerHTML = '<div class="slot-loading">Loading schedule…</div>';
        try {
          const res = await fetch(`${API}/mentors/${encodeURIComponent(mentorName)}/slots`);
          const slots = await res.json();
          if (!Array.isArray(slots) || slots.length === 0) {
            wrap.innerHTML = '<p style="font-size:13px;color:#64748b;padding:8px 0">No time slots available yet.</p>';
            return;
          }
          wrap.innerHTML = buildCalendarGrid(slots, cardIndex, mentorName);
        } catch(e) {
          wrap.innerHTML = `<p style="font-size:13px;color:#dc2626">Could not load slots: ${e.message}</p>`;
        }
      }

      function buildCalendarGrid(slots, cardIndex, mentorName) {
        // Collect all unique hour values and which days have slots
        const timeSet = new Set();
        const slotMap = {}; // key: "Day|HH:MM" → slot object
        slots.forEach(s => {
          timeSet.add(s.start_time);
          slotMap[`${s.day_of_week}|${s.start_time}`] = s;
        });

        // Only show days that have at least one slot
        const activeDays = DAYS.filter(d => slots.some(s => s.day_of_week === d));
        const times = Array.from(timeSet).sort();

        // Header row
        let html = '<table class="cal-table"><thead><tr>';
        html += '<th class="time-col">Time</th>';
        activeDays.forEach(d => {
          html += `<th>${d.slice(0,3)}</th>`;
        });
        html += '</tr></thead><tbody>';

        // One row per hour
        times.forEach(time => {
          const [h] = time.split(':').map(Number);
          const endH = h + 1;
          const label = `${fmt12(h)}`;
          html += '<tr>';
          html += `<td class="time-label">${label}</td>`;
          activeDays.forEach(day => {
            const slot = slotMap[`${day}|${time}`];
            if (slot) {
              const safeDay  = slot.day_of_week.replace(/'/g,"\\'");
              const safeStart = slot.start_time.replace(/'/g,"\\'");
              const safeEnd   = slot.end_time.replace(/'/g,"\\'");
              const safeMentor = mentorName.replace(/'/g,"\\'").replace(/"/g,'&quot;');
              html += `<td>
                <button class="slot-cell-btn"
                  data-slot-id="${slot.id}"
                  data-card="${cardIndex}"
                  onclick="selectSlot(${cardIndex},${slot.id},'${safeMentor}','${safeDay}','${safeStart}','${safeEnd}')">
                  ${fmt12(h)}–${fmt12(endH)}
                </button>
              </td>`;
            } else {
              html += '<td></td>';
            }
          });
          html += '</tr>';
        });

        html += '</tbody></table>';
        return html;
      }

      function fmt12(h) {
        if (h === 0)  return '12 AM';
        if (h === 12) return '12 PM';
        return h < 12 ? `${h} AM` : `${h - 12} PM`;
      }

      function selectSlot(cardIndex, slotId, mentorName, dayOfWeek, startTime, endTime) {
        // Highlight the chosen slot in the grid
        document.querySelectorAll(`.slot-cell-btn[data-card="${cardIndex}"]`).forEach(b => b.classList.remove('selected'));
        const btn = document.querySelector(`.slot-cell-btn[data-slot-id="${slotId}"][data-card="${cardIndex}"]`);
        if (btn) btn.classList.add('selected');

        const matchIndex = cardIndex + 1;
        const slotLabel = `${dayOfWeek}s ${startTime}–${endTime}`;
        addMsg('user', `Book ${matchIndex}`);
        sendSlotBooking(matchIndex, slotId, slotLabel, mentorName);
      }

      async function sendSlotBooking(matchNumber, slotId, slotLabel, mentorName) {
        try {
          const res1 = await fetch(`${API}/chat`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({session_id: SESSION, message: `book ${matchNumber}`, forced_agent: 'match'}),
          });
          const d1 = await res1.json();
          addMsg('bot', d1.reply || '', d1.active_agent || 'match');
          updateState(d1);

          if (d1.state === 'awaiting_slot_selection') {
            // Fetch the slots for this mentor to find which number our chosen slot is
            const slotsRes = await fetch(`${API}/mentors/${encodeURIComponent(mentorName)}/slots`);
            const slots = await slotsRes.json();
            const slotIndex = Array.isArray(slots) ? slots.findIndex(s => s.id === slotId) : -1;
            const slotNum = slotIndex >= 0 ? slotIndex + 1 : 1;

            addMsg('user', `${slotNum} — ${slotLabel}`);
            const res2 = await fetch(`${API}/chat`, {
              method: 'POST', headers: {'Content-Type':'application/json'},
              body: JSON.stringify({session_id: SESSION, message: String(slotNum), forced_agent: 'match'}),
            });
            const d2 = await res2.json();
            addMsg('bot', d2.reply || '', d2.active_agent || 'match');
            updateState(d2);
            renderMatches(d2.matches, d2);
          } else {
            renderMatches(d1.matches, d1);
          }
        } catch(e) {
          addMsg('bot', `Could not reach the assistant. Is the API reachable at ${API}?`);
        }
      }

      // ── Contest problem rendering (PDF page images) ─────────────────────────
      function renderProblems(problems) {
        lastProblems = problems || [];
        const panel = document.getElementById('contest-panel');
        const list = document.getElementById('problem-list');
        document.getElementById('contest-chips-wrap').style.display = 'none';
        if (!problems || !problems.length) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';

        list.innerHTML = problems.slice(0, 4).map((p, i) => {
          const probLabel = p.problem_number ? `Problem ${p.problem_number}${p.part ? ' Part '+p.part : ''}` : 'Problem';
          const topicChips = (p.topics||[]).map(t =>
            `<span class="topic-chip">${t.replace('_',' ')}</span>`).join('');
          const diagramBadge = p.has_diagram ? '<span class="diagram-badge">📐 diagram</span>' : '';

          return `
            <div class="problem-card" id="pcard-${i}">
              <div class="problem-card-header">
                <div class="problem-title">${escHtml(p.contest)} ${p.year} — ${probLabel}</div>
                <div class="topic-chips">${topicChips}${diagramBadge}</div>
              </div>
              <div class="problem-image-wrap" id="pimg-${i}">
                <div class="problem-loading">Loading problem...</div>
              </div>
              <div class="problem-actions">
                ${p.has_solution ? `<button class="prob-btn solution" id="sol-btn-${i}" onclick="toggleSolution(${i})">Show solution</button>` : ''}
                ${i > 0 ? '' : ''}
              </div>
            </div>`;
        }).join('');

        // Load each problem image
        problems.slice(0, 4).forEach((p, i) => loadProblemImage(p, i, false));
      }

      function renderProblemSetDownload(url, label, solutionsUrl) {
        const box = document.getElementById('problem-set-download');
        const text = document.getElementById('problem-set-label');
        const link = document.getElementById('problem-set-link');
        const solLink = document.getElementById('solutions-set-link');
        if (!url) {
          box.style.display = 'none';
          return;
        }
        text.textContent = label || 'Problem set ready';
        link.href = `${API}${url}`;
        if (solutionsUrl) {
          solLink.href = `${API}${solutionsUrl}`;
          solLink.style.display = 'inline-block';
        } else {
          solLink.style.display = 'none';
        }
        box.style.display = 'block';
        document.getElementById('contest-panel').style.display = 'block';
      }

      async function loadProblemImage(problem, index, showSolution) {
        const wrap = document.getElementById(`pimg-${index}`);
        if (!wrap) return;

        if (!problem.pdf_path) {
          wrap.innerHTML = `<div class="problem-error">⚠ PDF path not indexed. Re-run ingestion to enable image display.</div>`;
          return;
        }

        wrap.innerHTML = '<div class="problem-loading">Rendering page...</div>';
        try {
          const params = new URLSearchParams({
            pdf_path: problem.pdf_path,
            prob_num: problem.problem_number || (problem.page_number || 1),
            contest: problem.contest || '',
            scale: 2.0,
            show_solution: showSolution,
            solution_pdf_path: problem.solution_pdf_path || '',
          });
          const res = await fetch(`${API}/contest/page-image?${params}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          wrap.innerHTML = `<img src="data:image/png;base64,${data.image_base64}" alt="Contest problem page" />`;
        } catch (e) {
          wrap.innerHTML = `<div class="problem-error">⚠ Could not load page image: ${e.message}</div>`;
        }
      }

      // Track solution toggle state per problem
      const solutionState = {};
      function toggleSolution(index) {
        const p = lastProblems[index];
        if (!p) return;
        solutionState[index] = !solutionState[index];
        const btn = document.getElementById(`sol-btn-${index}`);
        if (btn) {
          btn.textContent = solutionState[index] ? 'Hide solution' : 'Show solution';
          btn.classList.toggle('active', solutionState[index]);
        }
        loadProblemImage(p, index, solutionState[index]);
      }

      // ── Contest status on load ──────────────────────────────────────────────
      async function loadContestStatus() {
        try {
          const res = await fetch(`${API}/contest/status`);
          const data = await res.json();
          if (data.indexed && data.contests && data.contests.length) {
            const chips = document.getElementById('contest-chips');
            const wrap = document.getElementById('contest-chips-wrap');
            const suggestions = [];
            data.contests.slice(0, 3).forEach(c => {
              if (c.years && c.years.length)
                suggestions.push(`Show me ${c.contest} ${c.years[0]} Q1`);
            });
            suggestions.push('Geometry practice problems', 'Explain a number theory solution');
            chips.innerHTML = suggestions.map(s =>
              `<span class="contest-chip" onclick="sendChip('${s}')">${s}</span>`).join('');
            document.getElementById('contest-panel').style.display = 'block';
            wrap.style.display = 'block';
          }
        } catch (e) { /* server not running */ }
      }

      function sendChip(text) { inputEl.value = text; send(); }

      function clearContestDisplay() {
        const panel = document.getElementById('contest-panel');
        const list = document.getElementById('problem-list');
        const dl = document.getElementById('problem-set-download');
        const chipsWrap = document.getElementById('contest-chips-wrap');
        list.innerHTML = '';
        dl.style.display = 'none';
        chipsWrap.style.display = 'none';
        panel.style.display = 'none';
      }

      // ── State update ────────────────────────────────────────────────────────
      function updateState(data) {
        const state = data.state || 'idle';
        const booking = data.booking_state || 'none';
        if (state === 'awaiting_match_details' || state === 'showing_results' || state === 'awaiting_booking_name' || booking === 'needs_grade' || booking === 'needs_subject' || booking === 'needs_grade_and_subject' || booking === 'search_results' || booking === 'awaiting_name') {
          activeChatMode = 'match';
        } else if (data.active_agent && data.active_agent !== 'contest') {
          activeChatMode = data.active_agent;
        }
        const bs = document.getElementById('book-state');
        bs.style.display = booking && booking !== 'none' ? 'block' : 'none';
        bs.textContent = booking !== 'none' ? `Booking: ${booking.replace(/_/g,' ')}` : '';
      }

      // ── Send ────────────────────────────────────────────────────────────────
      async function send() {
        const text = inputEl.value.trim();
        if (!text) return;
        inputEl.value = '';
        addMsg('user', text);

        if (selectedAgent === 'contest') {
          await sendContest(text);
        } else {
          await sendChat(text);
        }
      }

      async function sendChat(text) {
        document.getElementById('contest-panel').style.display = 'none';
        try {
          const effectiveAgent = activeChatMode === 'match' ? 'match' : selectedAgent;
          const res = await fetch(`${API}/chat`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({session_id: SESSION, message: text, forced_agent: effectiveAgent}),
          });
          const data = await res.json();
          addMsg('bot', data.reply || 'No reply.', data.active_agent || effectiveAgent);
          const booking = data.booking_state || 'none';
          const matchFlowActive = data.state === 'awaiting_match_details' || data.state === 'showing_results' || data.state === 'awaiting_booking_name' || booking === 'needs_grade' || booking === 'needs_subject' || booking === 'needs_grade_and_subject' || booking === 'search_results' || booking === 'awaiting_name';
          if (matchFlowActive && selectedAgent !== 'match') {
            applySelectedAgent('match', false);
          } else if (data.active_agent && data.active_agent !== selectedAgent) {
            applySelectedAgent(data.active_agent, false);
          }
          updateState(data);
          renderMatches(data.matches, data);
        } catch (e) {
          addMsg('bot', `Could not reach the assistant. Is the API reachable at ${API}?`);
        }
      }

      async function sendContest(text) {
        document.getElementById('results-panel').style.display = 'none';
        try {
          const res = await fetch(`${API}/contest/ask`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({message: text, session_id: SESSION}),
          });
          const data = await res.json();
          addMsg('bot', data.reply || 'No reply.', 'contest');
          if (data.active_agent && data.active_agent !== selectedAgent) {
            applySelectedAgent(data.active_agent, false);
          }
          if (data.active_agent === 'general') {
            selectedAgent = 'general';
            activeChatMode = 'general';
            document.getElementById('contest-panel').style.display = 'none';
            return;
          }
          const hasProblemSet = !!data.problem_set_url;
          const hasProblems = !!(data.problems && data.problems.length);

          if (hasProblemSet) {
            renderProblemSetDownload(data.problem_set_url, data.problem_set_label, data.solutions_url);
          }
          if (hasProblems) {
            renderProblems(data.problems);
          }
          if (!hasProblemSet && !hasProblems) {
            clearContestDisplay();
          }
        } catch (e) {
          addMsg('bot', `Could not reach the assistant. Is the API reachable at ${API}?`, 'contest');
        }
      }
    </script>
  </body>
</html>
