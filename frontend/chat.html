<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lumi Chat</title>
    <style>
      :root{
        --bg:#f5f7fb; --card:#ffffff; --accent:#6c5ce7; --user:#00b894; --bot:#0984e3; --muted:#6b7280;
      }
      html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Helvetica,Arial;background:var(--bg);color:#111}
      .container{max-width:820px;margin:36px auto;padding:20px;border-radius:12px;background:#ffffff;box-shadow:0 6px 24px rgba(21,32,43,0.08)}
      header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
      .logo{width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-weight:700}
      h1{font-size:18px;margin:0}
      #messages{background:var(--card);border-radius:8px;padding:14px;height:420px;overflow:auto;border:1px solid rgba(15,23,42,0.04)}
      .msg{display:flex;gap:10px;align-items:flex-end;margin:8px 0}
      .msg .bubble{max-width:72%;padding:10px 14px;border-radius:14px;line-height:1.35;white-space:pre-wrap}
      .msg.user{justify-content:flex-end}
      .msg.user .bubble{background:var(--user);color:#04311a;border-bottom-right-radius:4px}
      .msg.bot{justify-content:flex-start}
      .msg.bot .bubble{background:var(--bot);color:#082544;border-bottom-left-radius:4px}
      .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:600}
      .avatar.user{background:var(--user)}
      .avatar.bot{background:var(--bot)}
      .meta{font-size:12px;color:var(--muted);margin-top:6px}
      .quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
      .quick-action{background:#eef2ff;color:#2f3a8f;box-shadow:none;border:1px solid #dbe3ff}
      .quick-action:hover{background:#e3e9ff}
      .composer{display:flex;gap:10px;margin-top:12px}
      textarea{flex:1;min-height:64px;border-radius:10px;padding:10px;border:1px solid rgba(15,23,42,0.06);resize:none;font-size:14px}
      button{background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;box-shadow:0 6px 18px rgba(108,92,231,0.18)}
      button:active{transform:translateY(1px)}
      @media(max-width:640px){.container{margin:18px;padding:14px}.logo{width:36px;height:36px}}
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">LM</div>
        <div>
          <h1>Lumi</h1>
          <div class="meta">Find mentors and book sessions for academic help.</div>
        </div>
      </header>

      <div class="quick-actions">
        <button type="button" class="quick-action" data-message="help">What can you do?</button>
        <button type="button" class="quick-action" data-message="show all mentors">Show all mentors</button>
        <button type="button" class="quick-action" data-message="find match">Find a match</button>
        <button type="button" class="quick-action" data-message="restart">Restart</button>
      </div>

      <div id="messages" aria-live="polite"></div>

      <div class="composer">
        <textarea id="input" placeholder="Ask me anything about finding a mentor or booking a session..."></textarea>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button id="send">Send</button>
        </div>
      </div>
    </div>

    <script>
      const API = 'http://localhost:8000';
      const SESSION = 'session_' + Math.random().toString(36).slice(2,9);
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      document.getElementById('send').onclick = send;
      document.querySelectorAll('.quick-action').forEach((button) => {
        button.addEventListener('click', () => sendQuickMessage(button.dataset.message));
      });
      inputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });

      function el(tag,cls,txt){const d=document.createElement(tag); if(cls) d.className=cls; if(txt) d.textContent=txt; return d}

      function add(role, text){
        const wrap = el('div','msg '+role);
        const avatar = el('div','avatar '+role, role==='user'?'Y': 'B');
        const bubble = el('div','bubble', text);
        wrap.appendChild(role==='user'? bubble : avatar);
        wrap.appendChild(role==='user'? avatar : bubble);
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function send(){
        const text = inputEl.value.trim(); if(!text) return;
        inputEl.value = '';
        await sendMessage(text);
      }

      async function sendQuickMessage(text){
        await sendMessage(text);
      }

      async function sendMessage(text){
        add('user', text);
        try{
          const res = await fetch(API + '/chat', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({session_id: SESSION, message: text})
          });
          if(!res.ok) throw new Error('Bad response');
          const data = await res.json();
          add('bot', data.reply || 'Sorry, no reply.');
        }catch(e){
          add('bot', 'Could not reach backend. Is it running at http://localhost:8000 ?');
        }
      }
    </script>
  </body>
</html>
