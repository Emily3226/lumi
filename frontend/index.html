<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auxilizium — Mentor Matcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f3f8ff;
      --bg-2:     #e8f1ff;
      --surface:  rgba(255,255,255,0.88);
      --surface-2:#f7fbff;
      --border:   #cfe0ff;
      --accent:   #2563eb;
      --accent-2: #60a5fa;
      --green:    #0ea5e9;
      --muted:    #5b6b86;
      --text:     #10213a;
      --subtext:  #49617f;
      --shadow:   0 18px 60px rgba(37,99,235,0.12);
    }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.22), transparent 32%),
        radial-gradient(circle at top right, rgba(37,99,235,0.14), transparent 28%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem;
    }
    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.1rem, 4vw, 3rem);
      font-weight: 800;
      background: linear-gradient(135deg, #1d4ed8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--subtext);
      font-size: 0.78rem;
      margin-top: 0.45rem;
      letter-spacing: 0.16em;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(37,99,235,0.12);
      border-radius: 22px;
      padding: 1.5rem;
      width: 100%;
      max-width: 720px;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .form-row { display: flex; flex-direction: column; gap: 0.85rem; }
    .field-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.85rem; }
    @media (max-width: 700px) { .field-grid { grid-template-columns: 1fr; } }
    label { font-size: 0.68rem; letter-spacing: 0.12em; color: var(--subtext); margin-bottom: 0.35rem; display: block; }
    input, select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.82rem 0.95rem;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
      transform: translateY(-1px);
    }
    select option { background: #fff; }

    button.primary {
      width: 100%;
      margin-top: 1rem;
      padding: 0.95rem 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 14px 30px rgba(37,99,235,0.22);
    }
    button.primary:hover { transform: translateY(-1px); box-shadow: 0 18px 34px rgba(37,99,235,0.28); }
    button.primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Results */
    .results { display: flex; flex-direction: column; gap: 0.85rem; }
    .match-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(245,250,255,0.95));
      border: 1px solid rgba(37,99,235,0.12);
      border-radius: 18px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .match-card:hover { border-color: rgba(37,99,235,0.28); transform: translateY(-1px); box-shadow: 0 12px 26px rgba(37,99,235,0.08); }
    .match-card.top { border-color: rgba(37,99,235,0.34); }

    .score-ring {
      width: 52px; height: 52px;
      flex-shrink: 0;
      position: relative;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
    }

    .match-info { flex: 1; min-width: 0; }
    .match-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--text); }
    .match-meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
    .match-reason { font-size: 0.72rem; color: var(--subtext); margin-top: 0.45rem; line-height: 1.55; }
    .top-badge {
      font-size: 0.6rem;
      padding: 0.15rem 0.5rem;
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.22);
      border-radius: 20px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    button.book-btn {
      padding: 0.5rem 1rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--subtext);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    button.book-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 8px 18px rgba(37,99,235,0.08); }
    button.book-btn.booked { border-color: var(--accent); color: var(--accent); cursor: default; }

    .status-msg {
      font-size: 0.75rem;
      text-align: center;
      padding: 0.75rem;
      border-radius: 8px;
      margin-top: 0.5rem;
    }
    .status-msg.success { background: rgba(37,99,235,0.08); color: var(--accent); border: 1px solid rgba(37,99,235,0.18); }
    .status-msg.error   { background: rgba(239,68,68,0.08);  color: #dc2626;      border: 1px solid rgba(239,68,68,0.18); }

    .loading { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 1.5rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .loading span { animation: pulse 1.2s infinite; }
  </style>
</head>
<body>

<header>
  <h1>AUXILIZIUM</h1>
  <p>AI-POWERED MENTOR MATCHING</p>
</header>

<!-- Input form -->
<div class="card">
  <h2>▸ MENTEE DETAILS</h2>
  <div class="form-row">
    <div>
      <label>MENTEE NAME</label>
      <input id="name" type="text" placeholder="e.g. Alex Johnson"/>
    </div>
    <div class="field-grid">
      <div>
        <label>GRADE</label>
        <select id="grade">
          <option value="9">Grade 9</option>
          <option value="10">Grade 10</option>
          <option value="11">Grade 11</option>
          <option value="12">Grade 12</option>
        </select>
      </div>
      <div>
        <label>SUBJECT NEEDED</label>
        <select id="subject">
          <option value="Math">Math</option>
          <option value="Physics">Physics</option>
          <option value="Chemistry">Chemistry</option>
          <option value="Biology">Biology</option>
          <option value="English">English</option>
        </select>
      </div>
    </div>
  </div>
  <button class="primary" id="find-btn" onclick="findMatches()">FIND MATCHES →</button>
</div>

<!-- Results -->
<div class="card" id="results-card" style="display:none">
  <h2>▸ RANKED MATCHES</h2>
  <div class="results" id="results"></div>
  <div id="status-msg"></div>
</div>

<script>
  const API = "http://localhost:8000";
  let currentMentee = null;

  function scoreColor(score) {
    if (score >= 0.75) return "#34d399";
    if (score >= 0.5)  return "#fbbf24";
    return "#f87171";
  }

  function ScoreRing(score) {
    const r   = 22;
    const circ = 2 * Math.PI * r;
    const dash = circ * score;
    const color = scoreColor(score);
    return `
      <div class="score-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="${r}" fill="none" stroke="#1e1e2e" stroke-width="4"/>
          <circle cx="26" cy="26" r="${r}" fill="none"
            stroke="${color}" stroke-width="4"
            stroke-dasharray="${dash} ${circ}"
            stroke-linecap="round"/>
        </svg>
        <div class="score-label">${Math.round(score * 100)}%</div>
      </div>`;
  }

  async function findMatches() {
    const name    = document.getElementById("name").value.trim();
    const grade   = parseInt(document.getElementById("grade").value);
    const subject = document.getElementById("subject").value;

    if (!name) { alert("Please enter the mentee's name"); return; }

    currentMentee = { name, grade, subject };
    const btn = document.getElementById("find-btn");
    btn.disabled = true;
    btn.textContent = "SEARCHING...";

    document.getElementById("results-card").style.display = "block";
    document.getElementById("results").innerHTML = `<div class="loading"><span>Finding best matches using RAG + your trained model...</span></div>`;
    document.getElementById("status-msg").innerHTML = "";

    try {
      const res  = await fetch(`${API}/match`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mentee_name: name, mentee_grade: grade, mentee_subject: subject }),
      });
      const data = await res.json();
      renderMatches(data.matches);
    } catch (err) {
      document.getElementById("results").innerHTML =
        `<div class="status-msg error">Could not connect to backend. Is the server running?</div>`;
    }

    btn.disabled = false;
    btn.textContent = "FIND MATCHES →";
  }

  function renderMatches(matches) {
    const el = document.getElementById("results");
    el.innerHTML = matches.map((m, i) => `
      <div class="match-card ${i === 0 ? 'top' : ''}">
        ${ScoreRing(m.match_score)}
        <div class="match-info">
          <div style="display:flex;align-items:center;gap:0.6rem">
            <span class="match-name">${m.name}</span>
            ${i === 0 ? '<span class="top-badge">BEST MATCH</span>' : ''}
          </div>
          <div class="match-meta">Grade ${m.grade} · ${m.subject} · ${m.qualifications}</div>
          <div class="match-reason">${m.explanation}</div>
        </div>
        <button class="book-btn" id="book-${i}" onclick="book(${i}, this)"
          data-mentor='${JSON.stringify(m)}'>
          BOOK
        </button>
      </div>
    `).join("");
  }

  async function book(idx, btn) {
    if (!currentMentee) return;
    const mentor = JSON.parse(btn.dataset.mentor);
    btn.textContent = "...";
    btn.disabled = true;

    try {
      await fetch(`${API}/book`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          mentor_name:  mentor.name,
          mentee_name:  currentMentee.name,
          subject:      currentMentee.subject,
          mentor_grade: mentor.grade,
          mentee_grade: currentMentee.grade,
          match_score:  mentor.match_score,
          explanation:  mentor.explanation,
        }),
      });
      btn.textContent = "✓ BOOKED";
      btn.classList.add("booked");
      document.getElementById("status-msg").innerHTML =
        `<div class="status-msg success">Pairing saved: ${currentMentee.name} → ${mentor.name}</div>`;
    } catch {
      btn.textContent = "BOOK";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
